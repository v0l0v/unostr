<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Unostr - Una aplicación minimalista de Nostr">
    <title>Unostr - Relay Connect</title>
    <style>
        :root {
            /* Light Theme (Default Dusty Blue) */
            --color-bg: #F1FAFF;
            --color-surface: rgba(212, 239, 253, 0.6);
            --color-primary: #79C7F7;
            --color-text-secondary: #3D6A8C;
            --color-text-primary: #1E3A5F;
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: rgba(30, 58, 95, 0.08);
            --input-bg: #FFFFFF;
            --tab-active-bg: #FFFFFF;
            
            --error: #ef4444;
            --success: #10b981;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            /* Dark Theme (Deep Space Dusty Blue) */
            --color-bg: #0A1120;
            --color-surface: rgba(30, 58, 95, 0.4);
            --color-primary: #79C7F7;
            --color-text-secondary: #94A3B8;
            --color-text-primary: #F1FAFF;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --input-bg: rgba(15, 23, 42, 0.6);
            --tab-active-bg: var(--color-primary);
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: var(--transition);
            background-image: 
                radial-gradient(at 0% 0%, hsla(203,100%,90%,0.15) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(202,100%,85%,0.1) 0, transparent 50%);
        }

        [data-theme="dark"] body {
            background-image: 
                radial-gradient(at 0% 0%, rgba(121, 199, 247, 0.05) 0, transparent 50%), 
                radial-gradient(at 50% 0%, rgba(30, 58, 95, 0.2) 0, transparent 50%);
        }
        .container {
            position: relative;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            background: var(--color-surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 3.5rem 3rem;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 25px 50px -12px var(--glass-shadow),
                inset 0 1px 1px var(--glass-border);
            max-width: 500px;
            width: 90%;
            transition: var(--transition);
        }

        /* Theme Toggle styles */
        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(30, 58, 95, 0.05);
            border: 1px solid var(--glass-border);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--color-text-secondary);
        }

        .theme-toggle:hover {
            background: var(--color-primary);
            color: white;
            transform: rotate(15deg);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: var(--color-text-primary);
            font-weight: 800;
            letter-spacing: -0.025em;
        }
        .login-area {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-login {
            background-color: var(--color-surface);
            color: var(--color-text-secondary);
            border: 1px solid rgba(61, 106, 140, 0.1);
            padding: 0.5rem 1.25rem;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background-color: var(--color-primary);
            color: white;
            transform: translateY(-1px);
        }
        .profile-badge {
            display: none;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-family: monospace;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .relay-selector {
            display: flex;
            background: rgba(30, 58, 95, 0.05);
            padding: 6px;
            border-radius: 16px;
            margin-bottom: 2rem;
            border: 1px solid rgba(30, 58, 95, 0.05);
        }
        .tab-btn {
            flex: 1;
            padding: 0.7rem;
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
            font-size: 0.875rem;
        }
        .tab-btn.active {
            background: var(--tab-active-bg);
            color: var(--color-text-primary);
            box-shadow: 0 4px 6px -1px rgba(30, 58, 95, 0.1);
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--color-text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: var(--input-bg);
            border: 1px solid rgba(30, 58, 95, 0.1);
            border-radius: 14px;
            color: var(--color-text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(121, 199, 247, 0.15);
        }
        .btn {
            width: 100%;
            padding: 0.85rem 2rem;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(121, 199, 247, 0.3);
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(121, 199, 247, 0.4);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 14px;
            font-size: 0.875rem;
            display: none;
            animation: slideUp 0.3s ease-out;
            font-weight: 500;
        }
        .status-success {
            background: rgba(16, 185, 129, 0.08);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.1);
            display: block !important;
        }
        .status-error {
            background: rgba(239, 68, 68, 0.08);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.1);
            display: block !important;
        }
        .post-area {
            display: none;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px dashed rgba(30, 58, 95, 0.1);
            animation: slideUp 0.5s ease-out;
            margin-bottom: 2rem;
        }
        
        /* Feed Styles */
        .feed-container {
            display: none;
            text-align: left;
            margin-top: 2rem;
            animation: slideUp 0.6s ease-out;
        }
        .feed-title {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: var(--color-text-primary);
            padding-left: 0.5rem;
        }
        .event-card {
            background: var(--color-surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: var(--transition);
            animation: fadeIn 0.4s ease-out;
        }
        .event-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--glass-shadow);
        }
        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            font-size: 0.75rem;
        }
        .event-author {
            font-family: monospace;
            color: var(--color-primary);
            font-weight: 700;
            background: rgba(121, 199, 247, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
        }
        .event-time {
            color: var(--color-text-secondary);
            font-weight: 500;
        }
        .event-content {
            font-size: 0.9375rem;
            line-height: 1.5;
            color: var(--color-text-primary);
            white-space: pre-wrap;
            word-break: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        textarea {
            width: 100%;
            min-height: 120px;
            background: var(--input-bg);
            border: 1px solid rgba(30, 58, 95, 0.1);
            border-radius: 18px;
            color: var(--color-text-primary);
            padding: 1rem;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        textarea:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(121, 199, 247, 0.15);
        }
        .note {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--color-text-secondary);
            display: none;
            font-weight: 500;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema">
            <!-- Icono Luna (para pasar a oscuro) -->
            <svg id="theme-icon-dark" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <!-- Icono Sol (para pasar a claro) -->
            <svg id="theme-icon-light" style="display:none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>

        <div class="login-area">
            <button id="login-btn" class="btn-login">Login con NIP-07</button>
            <div id="profile-badge" class="profile-badge"></div>
        </div>

        <h1>Unostr</h1>
        
        <div class="relay-selector">
            <button id="btn-public" class="tab-btn active">Público</button>
            <button id="btn-private" class="tab-btn">Privado (Tor)</button>
        </div>

        <div class="input-group">
            <label for="relay-url" id="relay-label">Relay Público</label>
            <input type="text" id="relay-url" placeholder="wss://..." value="wss://nos.lol">
            <p id="tor-note" class="note">Este relay requiere Tor Browser o un proxy configurado.</p>
        </div>

        <button id="connect-btn" class="btn">Conectar</button>
        <div id="status"></div>

        <div id="post-area" class="post-area">
            <textarea id="post-content" placeholder="¿Qué está pasando en Nostr?"></textarea>
            <button id="publish-btn" class="btn btn-publish">Publicar</button>
        </div>

        <div id="feed-container" class="feed-container">
            <h2 class="feed-title">Feed Reciente</h2>
            <div id="feed-list"></div>
        </div>
    </div>

    <script type="module">
        import { Relay, nip19 } from 'https://esm.sh/nostr-tools@2.20.0';

        const loginBtn = document.getElementById('login-btn');
        const profileBadge = document.getElementById('profile-badge');

        const relayInput = document.getElementById('relay-url');
        const relayLabel = document.getElementById('relay-label');
        const connectBtn = document.getElementById('connect-btn');
        const statusDiv = document.getElementById('status');
        const torNote = document.getElementById('tor-note');

        const postArea = document.getElementById('post-area');
        const postContent = document.getElementById('post-content');
        const publishBtn = document.getElementById('publish-btn');

        const feedContainer = document.getElementById('feed-container');
        const feedList = document.getElementById('feed-list');
        
        const btnPublic = document.getElementById('btn-public');
        const btnPrivate = document.getElementById('btn-private');

        let currentRelay = null;
        let userPubKey = null;
        let currentSub = null;

        const DEFAULTS = {
            public: 'wss://nos.lol',
            private: 'ws://34tam2wfzzz7b5ai2oyuzhyozgjzvo4rrw3mzk4odjcspnkprtspqsqd.onion'
        };

        function checkAppState() {
            if (currentRelay && userPubKey) {
                postArea.style.display = 'block';
            }
            if (currentRelay) {
                feedContainer.style.display = 'block';
            }
        }

        function formatTime(timestamp) {
            return new Date(timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function createEventCard(event) {
            const npub = nip19.npubEncode(event.pubkey);
            const shortNpub = `${npub.substring(0, 8)}...${npub.substring(npub.length - 4)}`;
            
            const card = document.createElement('div');
            card.className = 'event-card';
            card.innerHTML = `
                <div class="event-header">
                    <span class="event-author" title="${npub}">${shortNpub}</span>
                    <span class="event-time">${formatTime(event.created_at)}</span>
                </div>
                <div class="event-content">${escapeHTML(event.content)}</div>
            `;
            return card;
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function startFeedSubscription(relay) {
            if (currentSub) currentSub.close();
            
            feedList.innerHTML = ''; // Limpiar feed anterior

            currentSub = relay.subscribe([
                {
                    kinds: [1],
                    limit: 20
                }
            ], {
                onevent(event) {
                    const card = createEventCard(event);
                    feedList.prepend(card);
                    
                    // Mantener solo los últimos 50 mensajes en el DOM
                    if (feedList.childElementCount > 50) {
                        feedList.removeChild(feedList.lastChild);
                    }
                },
                oneose() {
                    console.log('Eose: historical events loaded');
                }
            });
        }

        // Switch to Public
        btnPublic.addEventListener('click', () => {
            btnPublic.classList.add('active');
            btnPrivate.classList.remove('active');
            relayInput.value = DEFAULTS.public;
            relayLabel.textContent = 'Relay Público';
            torNote.style.display = 'none';
        });

        // Switch to Private
        btnPrivate.addEventListener('click', () => {
            btnPrivate.classList.add('active');
            btnPublic.classList.remove('active');
            relayInput.value = DEFAULTS.private;
            relayLabel.textContent = 'Relay Privado (.onion)';
            torNote.style.display = 'block';
        });

        function setStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = type === 'success' ? 'status-success' : 'status-error';
        }

        connectBtn.addEventListener('click', async () => {
            const url = relayInput.value.trim();
            if (!url) {
                setStatus('Por favor, ingresa una URL válida.', 'error');
                return;
            }

            connectBtn.disabled = true;
            connectBtn.textContent = 'Conectando...';
            statusDiv.style.display = 'none';

            try {
                if (currentRelay) await currentRelay.close();
                
                currentRelay = await Relay.connect(url);
                setStatus(`Conectado a ${currentRelay.url}`, 'success');
                
                currentRelay.onclose = () => {
                    setStatus(`Conexión cerrada con ${url}`, 'error');
                    currentRelay = null;
                    postArea.style.display = 'none';
                    feedContainer.style.display = 'none';
                    if (currentSub) currentSub.close();
                };

                startFeedSubscription(currentRelay);
                checkAppState();

            } catch (error) {
                console.error(error);
                setStatus(`Error al conectar a ${url}: ${error.message || 'Error de conexión'}`, 'error');
            } finally {
                connectBtn.disabled = false;
                connectBtn.textContent = 'Conectar';
            }
        });

        // NIP-07 Login Logic
        loginBtn.addEventListener('click', async () => {
            if (!window.nostr) {
                let msg = 'No se detectó ninguna extensión de Nostr (NIP-07).';
                if (window.location.protocol === 'file:') {
                    msg += '\n\n💡 Pista: Si estás abriendo el archivo localmente (file://), debes activar "Permitir acceso a las URL de archivo" en la configuración de tu extensión en Chrome (chrome://extensions).';
                }
                alert(msg);
                return;
            }

            try {
                userPubKey = await window.nostr.getPublicKey();
                const npub = nip19.npubEncode(userPubKey);
                
                const displayNpub = `${npub.substring(0, 10)}...${npub.substring(npub.length - 4)}`;
                
                profileBadge.textContent = displayNpub;
                profileBadge.style.display = 'block';
                loginBtn.style.display = 'none';
                
                checkAppState();
            } catch (error) {
                console.error('Login error:', error);
                alert('Error al obtener la clave pública: ' + error.message);
            }
        });

        // Publish Message Logic
        publishBtn.addEventListener('click', async () => {
            const content = postContent.value.trim();
            if (!content) return;

            if (!currentRelay) {
                setStatus('No hay conexión con el relay.', 'error');
                return;
            }

            publishBtn.disabled = true;
            publishBtn.textContent = 'Publicando...';

            try {
                const eventTemplate = {
                    kind: 1,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [],
                    content: content
                };

                const signedEvent = await window.nostr.signEvent(eventTemplate);
                
                // Añadimos un timeout manual de 10s por si el relay es lento con el OK
                const publishTimeout = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('El relay tardó demasiado en confirmar. Es posible que el mensaje se haya publicado de todas formas.')), 10000)
                );

                await Promise.race([
                    currentRelay.publish(signedEvent),
                    publishTimeout
                ]);
                
                setStatus('¡Mensaje publicado con éxito!', 'success');
                postContent.value = ''; // Limpiar tras el éxito
            } catch (error) {
                console.error('Publish error:', error);
                setStatus('Error al publicar: ' + (error.message || 'Desconocido'), 'error');
            } finally {
                publishBtn.disabled = false;
                publishBtn.textContent = 'Publicar';
            }
        });

        // Theme Management
        const themeToggle = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-icon-dark');
        const lightIcon = document.getElementById('theme-icon-light');

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'dark') {
                darkIcon.style.display = 'none';
                lightIcon.style.display = 'block';
            } else {
                darkIcon.style.display = 'block';
                lightIcon.style.display = 'none';
            }
            localStorage.setItem('theme', theme);
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        applyTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
    </script>

</body>
</html>
