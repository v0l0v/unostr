<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Unostr - Cliente Nostr Técnico y Privado">
    <title>Unostr // [Technical UI]</title>
    <!-- Google Fonts for Mono Aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cypherpunk / Technical Color Palette */
            --bg-base: #0a0b0d;
            --bg-surface: #12141a;
            --bg-hover: #1c1f26;
            
            --border-dim: #2d3139;
            --border-bright: #3f444e;
            
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-dim: #475569;
            
            --accent-cyan: #00f2ff;
            --accent-amber: #ffb000;
            --accent-green: #00ff41; /* Terminal classic */
            --accent-red: #ff3e3e;
            
            --font-main: 'JetBrains Mono', 'Roboto Mono', 'SF Mono', 'Menlo', monospace;
            --font-size-base: 14px;
            --transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            --gap: 1.5rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: var(--font-size-base);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Jakob Nielsen: Consistent Layout */
        header {
            border-bottom: 1px solid var(--border-dim);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -1px;
            color: var(--accent-cyan);
            text-transform: uppercase;
        }

        .brand span { color: var(--text-primary); }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        main {
            flex: 1;
            max-width: 800px;
            width: 95%;
            margin: 0 auto;
            padding: var(--gap);
            display: flex;
            flex-direction: column;
            gap: var(--gap);
        }

        /* Components: Technical Styling */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            border-radius: 4px; /* Cypherpunk sharp edges */
            padding: 1.5rem;
            transition: var(--transition);
        }

        .card:hover { border-color: var(--border-bright); }

        .section-title {
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::before {
            content: "";
            width: 4px;
            height: 4px;
            background: var(--accent-cyan);
        }

        /* Inputs & Buttons: Nielsen's Efficiency & Standards */
        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            background: var(--bg-base);
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            padding: 0.75rem;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        input:focus, textarea:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 1px var(--accent-cyan);
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            cursor: pointer;
            border: 1px solid var(--border-bright);
            background: var(--bg-surface);
            padding: 0.6rem 1.25rem;
            color: var(--text-primary);
            font-family: inherit;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-width: 120px;
        }

        .btn:hover:not(:disabled) {
            background: var(--bg-hover);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .btn:active:not(:disabled) {
            background: var(--bg-base);
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .btn.primary {
            background: var(--accent-cyan);
            color: var(--bg-base);
            border-color: var(--accent-cyan);
        }

        .btn.primary:hover:not(:disabled) {
            background: white;
            color: var(--bg-base);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        /* Visibility of Status: Relay Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-dim);
            margin-bottom: 1rem;
        }

        .tab {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--accent-cyan);
            border-bottom-color: var(--accent-cyan);
        }

        /* Nielsen Heuristic #1: System Console */
        footer {
            height: 200px;
            background: #050608;
            border-top: 1px solid var(--accent-cyan);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .console-header {
            padding: 0.5rem 1rem;
            background: var(--bg-surface);
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-dim);
        }

        #console-log {
            flex: 1;
            padding: 0.75rem;
            overflow-y: auto;
            font-size: 0.7rem;
            color: var(--accent-green);
            background: #000;
        }

        .log-entry { margin-bottom: 0.25rem; }
        .log-time { color: var(--text-dim); margin-right: 0.5rem; }
        .log-warn { color: var(--accent-amber); }
        .log-error { color: var(--accent-red); }

        /* Feed: Information Density */
        .event-card {
            border-left: 2px solid var(--border-dim);
            padding-left: 1rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .event-card:hover { border-left-color: var(--accent-cyan); }

        .event-meta {
            font-size: 0.7rem;
            display: flex;
            gap: 1rem;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
        }

        .event-npub { color: var(--accent-cyan); font-weight: 700; }

        .event-content {
            font-size: 0.9rem;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid var(--border-dim);
        }

        .status-online { color: var(--accent-green); border-color: rgba(0, 255, 65, 0.2); background: rgba(0, 255, 65, 0.05); }
        .status-offline { color: var(--accent-red); border-color: rgba(255, 62, 62, 0.2); background: rgba(255, 62, 62, 0.05); }

        /* Media Queries for Responsive Design */
        @media (max-width: 600px) {
            header { padding: 1rem; }
            main { padding: 1rem; }
            .btn-group { flex-direction: column; }
            .btn { width: 100%; }
        }

        /* Utilities */
        .hidden { display: none !important; }
        .amber { color: var(--accent-amber); }
    </style>
</head>
<body>
    <header>
        <div class="brand">UNOSTR //<span>CLIENT</span></div>
        <div class="header-actions">
            <div id="ws-status" class="status-badge status-offline">NOT_CONNECTED</div>
            <button id="login-btn" class="btn">Login (NIP-07)</button>
            <div id="profile-badge" class="hidden status-badge status-online"></div>
        </div>
    </header>

    <main>
        <!-- Relay Config / Jakob Nielsen Heuristic #5 User Control & Freedom -->
        <section class="card">
            <div class="section-title">Connectivity Config</div>
            <div class="tabs">
                <button id="btn-public" class="tab active">Public_Network</button>
                <button id="btn-private" class="tab">Tor_Encrypted</button>
            </div>
            
            <div class="input-wrapper">
                <label for="relay-url">RELAY_URI</label>
                <input type="text" id="relay-url" placeholder="wss://..." value="wss://nos.lol">
                <p id="tor-note" class="hidden amber" style="font-size: 0.7rem;">[WARNING] Onion address requires Tor Network browser.</p>
            </div>

            <div class="btn-group">
                <button id="connect-btn" class="btn primary">Establish_Connection</button>
            </div>
        </section>

        <!-- Broadcast Section / Nielsen Efficiency -->
        <section id="post-area" class="card hidden">
            <div class="section-title">Broadcast Data</div>
            <div class="input-wrapper">
                <textarea id="post-content" placeholder="// Write message for the void..."></textarea>
            </div>
            <button id="publish-btn" class="btn primary">Sign & Broadcast</button>
        </section>

        <!-- Recent Data Stream -->
        <section id="feed-container" class="card hidden">
            <div class="section-title">Data Stream [Kind 1]</div>
            <div id="feed-list"></div>
        </section>
    </main>

    <!-- Nielsen System Visibility Console -->
    <footer>
        <div class="console-header">
            <span>System Console // Nostr Events</span>
            <span id="console-status">READY</span>
        </div>
        <div id="console-log">
            <div class="log-entry"><span class="log-time">00:00:00</span> <span class="log-warn">[SYS] Dashboard initialized. Awaiting user interaction.</span></div>
        </div>
    </footer>

    <script type="module">
        import { Relay, nip19 } from 'https://esm.sh/nostr-tools@2.20.0';

        const loginBtn = document.getElementById('login-btn');
        const profileBadge = document.getElementById('profile-badge');
        const wsStatus = document.getElementById('ws-status');

        const relayInput = document.getElementById('relay-url');
        const connectBtn = document.getElementById('connect-btn');
        const torNote = document.getElementById('tor-note');

        const postArea = document.getElementById('post-area');
        const postContent = document.getElementById('post-content');
        const publishBtn = document.getElementById('publish-btn');

        const feedContainer = document.getElementById('feed-container');
        const feedList = document.getElementById('feed-list');
        
        const btnPublic = document.getElementById('btn-public');
        const btnPrivate = document.getElementById('btn-private');

        const consoleLog = document.getElementById('console-log');
        const consoleStatus = document.getElementById('console-status');

        let currentRelay = null;
        let userPubKey = null;
        let currentSub = null;

        const DEFAULTS = {
            public: 'wss://nos.lol',
            private: 'ws://34tam2wfzzz7b5ai2oyuzhyozgjzvo4rrw3mzk4odjcspnkprtspqsqd.onion'
        };

        // UI Helpers
        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString('en-GB', { hour12: false });
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'warn' ? 'log-warn' : type === 'error' ? 'log-error' : ''}`;
            entry.innerHTML = `<span class="log-time">${time}</span> ${msg}`;
            consoleLog.prepend(entry);
        }

        function checkAppState() {
            if (currentRelay) {
                feedContainer.classList.remove('hidden');
                wsStatus.className = 'status-badge status-online';
                wsStatus.textContent = `CONNECTED // ${currentRelay.url.split('://')[1]}`;
            } else {
                wsStatus.className = 'status-badge status-offline';
                wsStatus.textContent = 'NOT_CONNECTED';
            }
            if (currentRelay && userPubKey) {
                postArea.classList.remove('hidden');
            }
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatTime(timestamp) {
            return new Date(timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function createEventCard(event) {
            const npub = nip19.npubEncode(event.pubkey);
            const shortNpub = `${npub.substring(0, 8)}...${npub.substring(npub.length - 4)}`;
            
            const card = document.createElement('div');
            card.className = 'event-card';
            card.innerHTML = `
                <div class="event-meta">
                    <span class="event-npub" title="${npub}">${shortNpub}</span>
                    <span class="event-time">${formatTime(event.created_at)}</span>
                </div>
                <div class="event-content">${escapeHTML(event.content)}</div>
            `;
            return card;
        }

        function startFeedSubscription(relay) {
            if (currentSub) currentSub.close();
            feedList.innerHTML = '';
            log(`Starting subscription kind:1 for ${relay.url}`);

            currentSub = relay.subscribe([
                { kinds: [1], limit: 20 }
            ], {
                onevent(event) {
                    const card = createEventCard(event);
                    feedList.prepend(card);
                    if (feedList.childElementCount > 30) feedList.removeChild(feedList.lastChild);
                },
                oneose() {
                    log(`Historical data loaded from ${relay.url}`);
                    consoleStatus.textContent = 'STREAM_ACTIVE';
                }
            });
        }

        // Event Listeners
        btnPublic.addEventListener('click', () => {
            btnPublic.classList.add('active');
            btnPrivate.classList.remove('active');
            relayInput.value = DEFAULTS.public;
            torNote.classList.add('hidden');
        });

        btnPrivate.addEventListener('click', () => {
            btnPrivate.classList.add('active');
            btnPublic.classList.remove('active');
            relayInput.value = DEFAULTS.private;
            torNote.classList.remove('hidden');
        });

        connectBtn.addEventListener('click', async () => {
            const url = relayInput.value.trim();
            if (!url) return log('Error: Invalid Relay URI', 'error');

            connectBtn.disabled = true;
            connectBtn.textContent = 'ESTABLISHING...';
            log(`Attempting connection to: ${url}`);

            try {
                if (currentRelay) await currentRelay.close();
                currentRelay = await Relay.connect(url);
                log(`Successfully connected to ${currentRelay.url}`);
                
                currentRelay.onclose = () => {
                    log(`Disconnected from ${url}`, 'error');
                    currentRelay = null;
                    postArea.classList.add('hidden');
                    feedContainer.classList.add('hidden');
                    if (currentSub) currentSub.close();
                    checkAppState();
                };

                startFeedSubscription(currentRelay);
                checkAppState();

            } catch (error) {
                log(`Connection Failed: ${error.message}`, 'error');
            } finally {
                connectBtn.disabled = false;
                connectBtn.textContent = 'Establish_Connection';
            }
        });

        loginBtn.addEventListener('click', async () => {
            if (!window.nostr) return log('NIP-07 plugin not found. Check browser extensions.', 'error');

            try {
                log('Requesting public key from extension...');
                userPubKey = await window.nostr.getPublicKey();
                const npub = nip19.npubEncode(userPubKey);
                profileBadge.textContent = `${npub.substring(0, 8)}...`;
                profileBadge.classList.remove('hidden');
                loginBtn.classList.add('hidden');
                log(`Identity verified: ${npub}`);
                checkAppState();
            } catch (error) {
                log(`Auth failed: ${error.message}`, 'error');
            }
        });

        publishBtn.addEventListener('click', async () => {
            const content = postContent.value.trim();
            if (!content) return;

            if (!currentRelay) return log('Error: Cannot sign without active connection.', 'error');

            publishBtn.disabled = true;
            publishBtn.textContent = 'SIGNING...';
            log('Requesting signature for Event Kind 1...');

            try {
                const eventTemplate = {
                    kind: 1,
                    created_at: Math.floor(Date.now() / 1000),
                    tags: [],
                    content: content
                };

                const signedEvent = await window.nostr.signEvent(eventTemplate);
                log(`Event signed. Publishing ID: ${signedEvent.id.substring(0, 8)}...`);
                
                const publishTimeout = new Promise((_, reject) => 
                    setTimeout(() => reject(new Error('Relay confirmation timeout (10s).')), 10000)
                );

                await Promise.race([
                    currentRelay.publish(signedEvent),
                    publishTimeout
                ]);

                log('Relay confirmed receipt [OK].', 'info');
                postContent.value = '';
            } catch (error) {
                log(`Broadcast failed: ${error.message}`, 'warn');
            } finally {
                publishBtn.disabled = false;
                publishBtn.textContent = 'Sign & Broadcast';
            }
        });
    </script>
</body>
</html>
